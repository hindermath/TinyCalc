name: Homogeneity Check

on:
  push:
  pull_request:

jobs:
  check:
    name: Agent Secret Scan (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ripgrep (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Install ripgrep (macOS)
        if: runner.os == 'macOS'
        env:
          RIPGREP_VERSION: 15.1.0
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          case "$arch" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *) echo "Unsupported macOS architecture: $arch" >&2; exit 1 ;;
          esac
          archive="ripgrep-${RIPGREP_VERSION}-${target}.tar.gz"
          base_url="https://github.com/BurntSushi/ripgrep/releases/download/${RIPGREP_VERSION}"
          curl -fsSLO "${base_url}/${archive}"
          curl -fsSLO "${base_url}/${archive}.sha256"
          shasum -a 256 -c "${archive}.sha256"
          tar -xzf "${archive}"
          sudo install -m 0755 "ripgrep-${RIPGREP_VERSION}-${target}/rg" /usr/local/bin/rg
          rg --version

      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep -y

      - name: Run Agent Secret Scan (Bash)
        if: runner.os != 'Windows'
        run: bash scripts/scan-agent-secrets.sh --fail-on-high .

      - name: Run Agent Secret Scan (Bash on Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: bash scripts/scan-agent-secrets.sh --fail-on-high .
